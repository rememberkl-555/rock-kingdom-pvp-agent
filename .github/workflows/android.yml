name: Build Android APK
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.29.2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-
      - run: pnpm install --frozen-lockfile
        timeout-minutes: 10
      - run: npx expo prebuild --platform android --clean
        timeout-minutes: 10
      - name: Build APK
        run: |
          cd android
          # Force JS bundle to be embedded in debug APK
          sed -i '/^react {/a\    debuggableVariants = []' app/build.gradle
          chmod +x gradlew
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          ./gradlew assembleDebug --no-daemon --no-build-cache
        timeout-minutes: 60
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mobile-agent-pvp-apk
          path: android/app/build/outputs/apk/debug/*.apk
          compression-level: 0
          retention-days: 30
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.5.5
          name: "洛克王国 PVP AI 代打系统 v1.5.5（汉化版）"
          files: android/app/build/outputs/apk/debug/*.apk
          body: |
            # 洛克王国 PVP AI 代打系统 v1.5.5
            - 全中文界面，应用名「洛克王国」
            - JS 直接打包进 APK（无需开发服务器）
            - PVP AI 代打完整模块
            - 云端服务器：193.112.187.72:8047
          prerelease: true
