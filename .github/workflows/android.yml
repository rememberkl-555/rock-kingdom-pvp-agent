name: Build Android APK
on: [push, workflow_dispatch]
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.29.2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - run: pnpm install --frozen-lockfile
      - run: npx expo prebuild --platform android --clean --no-install
      - run: |
          cd android
          chmod +x gradlew
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          ./gradlew assembleDebug --no-daemon -Dorg.gradle.jvmargs=-Xmx4g
      - uses: actions/upload-artifact@v4
        with:
          name: mobile-agent-pvp-apk
          path: android/app/build/outputs/apk/debug/*.apk
          compression-level: 0
          retention-days: 30
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.5.2
          name: "Rock Kingdom PVP AI Agent v1.5.2"
          files: android/app/build/outputs/apk/debug/*.apk
          body: |
            # 洛克王国 PVP AI 代打系统 v1.5.2
            - PVP AI 代打系统完整模块
            - 战局状态解析（sensenova-6.7-flash-lite）
            - 策略决策引擎（deepseek-v4-flash）
            - HUD 弹幕实时展示思考过程
            - 战斗循环控制器
            - 云端服务器：193.112.187.72:8047
          prerelease: true