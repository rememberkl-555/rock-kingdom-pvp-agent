name: Build Android APK
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      
      - uses: pnpm/action-setup@v4
        with:
          version: 10.29.2
      
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
        
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-
      
      - run: pnpm install --frozen-lockfile
        timeout-minutes: 10
      
      - name: Export and build APK
        run: |
          npx expo export --platform android 2>&1 || true
          npx expo run:android --no-build-cache 2>&1
        timeout-minutes: 45
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
      
      - name: Find and Upload APK
        run: |
          find . -name '*.apk' -type f | head -10
          mkdir -p apk-output
          find . -name '*.apk' -type f -exec cp {} apk-output/ \;
      
      - uses: actions/upload-artifact@v4
        with:
          name: mobile-agent-pvp-apk
          path: apk-output/*.apk
          compression-level: 0
          retention-days: 30
      
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.5.3
          name: "Rock Kingdom PVP AI Agent v1.5.3"
          files: apk-output/*.apk
          body: |
            # 洛克王国 PVP AI 代打系统 v1.5.3
            - PVP AI 代打系统完整模块
            - 战局状态解析（sensenova-6.7-flash-lite）
            - 策略决策引擎（deepseek-v4-flash）
            - HUD 弹幕实时展示思考过程
            - 战斗循环控制器
            - 云端服务器：193.112.187.72:8047
          prerelease: true
